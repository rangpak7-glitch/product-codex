<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>비밀번호 재설정 | 기도의샘물</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260723-a11y1">
  <link rel="stylesheet" href="assets/css/editorial-redesign.css?v=20260723-a11y1">
</head>
<body class="account-page password-reset-page">
<main>
  <section class="section password-reset-panel">
    <div>
      <p class="eyebrow">Password Recovery</p>
      <h1>새 비밀번호 설정</h1>
      <p>재설정 메일의 링크로 들어오셨다면 새 비밀번호를 두 번 입력해 주세요.</p>
    </div>
    <form class="faith-auth-form" data-password-reset-form aria-label="새 비밀번호 설정">
      <label>새 비밀번호<input type="password" name="password" autocomplete="new-password" minlength="8" required placeholder="8자 이상"></label>
      <label>새 비밀번호 확인<input type="password" name="passwordConfirm" autocomplete="new-password" minlength="8" required></label>
      <button class="button primary" type="submit">새 비밀번호 저장</button>
      <p class="form-message" data-password-reset-status role="status"></p>
      <a class="text-button" href="index.html">홈으로 돌아가기</a>
    </form>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/reset-password.js"></script>
</body>
</html>
