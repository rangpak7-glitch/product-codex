<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>비밀번호 재설정 | 기도의 샘물</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-page">
<main>
  <section class="section admin-gate-panel">
    <div>
      <p class="eyebrow">Password Recovery</p>
      <h1>새 비밀번호 설정</h1>
      <p>이 페이지는 비밀번호 재설정 메일의 링크를 통해서만 사용할 수 있습니다.</p>
    </div>
    <form class="admin-gate-form" data-password-reset-form aria-label="새 비밀번호 설정">
      <label>새 비밀번호<input type="password" name="password" autocomplete="new-password" minlength="8" required placeholder="8자 이상"></label>
      <label>새 비밀번호 확인<input type="password" name="passwordConfirm" autocomplete="new-password" minlength="8" required></label>
      <button class="button primary" type="submit">새 비밀번호 저장</button>
      <p class="form-message" data-password-reset-status role="status"></p>
      <a class="text-button" href="admin-faith-resources.html">관리자 로그인으로 돌아가기</a>
    </form>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-config.js"></script>
<script src="assets/js/reset-password.js"></script>
</body>
</html>
