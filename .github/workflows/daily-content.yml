name: Generate daily content

on:
  schedule:
    # 21:00 UTC is 06:00 the following day in Asia/Seoul.
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-content-main
  cancel-in-progress: false

jobs:
  generate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate today's content
        run: node tools/generate_daily_contents.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}

      - name: Validate daily content syntax
        run: node --check data/dailyContents.js

      - name: Commit and push generated content
        run: |
          if git diff --quiet -- data/dailyContents.js; then
            echo "No new daily content to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dailyContents.js
          git commit -m "chore(content): add daily content"
          git push origin HEAD:main
