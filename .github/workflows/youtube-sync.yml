name: Sync YouTube videos

on:
  workflow_dispatch:
  schedule:
    # 19:07 UTC is 04:07 the following day in Asia/Seoul.
    # Avoid the start-of-hour load that can substantially delay scheduled runs.
    - cron: "7 19 * * *"

permissions:
  contents: write

concurrency:
  group: daily-content-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Sync channel uploads
        env:
          YOUTUBE_CHANNEL_ID: UCFrsilNKJ8xcmn0RUrFz6XQ
        run: node tools/sync_youtube_videos.mjs
      - name: Validate video data syntax
        run: node --check data/videos.js
      - name: Commit updated videos
        run: |
          if git diff --quiet -- data/videos.js; then
            echo "No video changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/videos.js
          git commit -m "Update YouTube video archive"
          git push origin HEAD:main
