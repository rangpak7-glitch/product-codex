<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>신앙자료 주문·환불 관리 | 기도의샘물</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260723-a11y1">
  <link rel="stylesheet" href="assets/css/editorial-redesign.css?v=20260723-a11y1">
  <link rel="stylesheet" href="assets/css/admin-faith-resources.css">
</head>
<body class="admin-page">
<main class="admin-app">
  <section class="admin-gate-panel" data-admin-gate>
    <div class="admin-gate-copy">
      <p class="eyebrow">Admin Access</p>
      <h1>주문·환불 관리자</h1>
      <p>관리자 계정으로 결제 주문과 다운로드 이력을 확인합니다.</p>
    </div>
    <form class="admin-gate-form" data-admin-login-form aria-label="관리자 로그인">
      <label>이메일<input type="email" name="email" autocomplete="email" required></label>
      <label>비밀번호<input type="password" name="password" autocomplete="current-password" required></label>
      <button class="button primary" type="submit">관리자 로그인</button>
      <p class="form-message" data-admin-auth-status role="status" aria-live="polite"></p>
    </form>
  </section>

  <section class="admin-dashboard" data-admin-panel hidden>
    <header class="admin-topbar">
      <a class="admin-brand" href="index.html"><img src="assets/logo-sam.png" alt="" width="38" height="38"><span><strong>기도의샘물</strong><small>주문·환불 관리자</small></span></a>
      <div class="admin-topbar-actions"><a class="button secondary" href="admin-faith-resources.html">자료 관리</a><a class="button secondary" href="admin-customers.html">고객·문의</a><a class="button secondary" href="prayer-cards.html" target="_blank" rel="noopener">신앙자료 페이지</a><button class="text-button" type="button" data-admin-logout>로그아웃</button></div>
    </header>

    <div class="admin-console">
      <aside class="admin-sidebar" aria-label="결제 운영">
        <strong>결제 운영</strong>
        <button class="is-active" type="button">전체 주문</button>
        <div class="admin-sidebar-links"><strong>운영 바로가기</strong><a href="admin-faith-resources.html">신앙자료 관리</a><a href="admin-customers.html">고객·문의 관리</a><a href="account.html">내 계정 보기</a></div>
      </aside>

      <div class="admin-workspace">
        <div class="admin-workspace-head">
          <div><p class="eyebrow">Order Operations</p><h2>주문·환불 관리</h2><p>단건 결제 상태, 구매자, 다운로드 이력과 전액 환불을 확인합니다.</p></div>
          <button class="button secondary" type="button" data-order-refresh>새로고침</button>
        </div>

        <div class="admin-stat-grid" aria-label="주문 현황">
          <article><span>전체 주문</span><strong data-stat="total">0</strong></article>
          <article><span>결제 완료</span><strong data-stat="paid">0</strong></article>
          <article><span>환불 완료</span><strong data-stat="refunded">0</strong></article>
          <article><span>결제 대기</span><strong data-stat="ready">0</strong></article>
        </div>

        <div class="admin-list-toolbar">
          <label class="admin-search"><span>주문 검색</span><input type="search" data-order-search placeholder="상품명, 주문번호, 구매 이메일"></label>
          <label><span>주문 상태</span><select data-order-status><option value="all">전체 상태</option><option value="paid">결제 완료</option><option value="refunded">환불 완료</option><option value="ready">결제 대기</option><option value="failed">결제 실패</option><option value="canceled">결제 취소</option></select></label>
          <label><span>자료 유형</span><select data-order-type><option value="all">전체 유형</option><option value="pdf">기도문 PDF</option><option value="audio">기도 오디오북</option><option value="card">기도카드</option></select></label>
        </div>
        <p class="form-message admin-global-status" data-order-status-message role="status" aria-live="polite"></p>
        <div class="admin-resource-list" data-order-list aria-live="polite"></div>
      </div>
    </div>
  </section>

  <dialog class="admin-editor" data-refund-dialog aria-labelledby="refundDialogTitle">
    <form data-refund-form>
      <header class="admin-editor-head"><div><p class="eyebrow">Full Refund</p><h2 id="refundDialogTitle">주문 전액 환불</h2></div><button class="admin-icon-button" type="button" data-refund-close aria-label="환불 창 닫기">×</button></header>
      <input type="hidden" name="orderId">
      <section class="admin-editor-step is-active">
        <p data-refund-order-summary></p>
        <label>환불 사유<textarea name="reason" rows="4" minlength="2" maxlength="300" required placeholder="고객에게 안내할 환불 사유를 입력합니다."></textarea></label>
        <label data-download-confirm-row hidden><input type="checkbox" name="confirmDownloaded"> 원본 다운로드 이력을 확인했으며 환불 제한 여부를 검토했습니다.</label>
        <p class="form-message" data-refund-status role="status" aria-live="polite"></p>
      </section>
      <footer class="admin-editor-footer"><div><button class="button secondary" type="button" data-refund-cancel>취소</button><button class="button primary" type="submit">전액 환불 실행</button></div></footer>
    </form>
  </dialog>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-config.js?v=20260715-worker1"></script>
<script src="assets/js/admin-faith-orders.js?v=20260715-1"></script>
</body>
</html>
