<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>고객·문의 관리 | 기도의샘물</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/editorial-redesign.css">
  <link rel="stylesheet" href="assets/css/admin-faith-resources.css?v=20260721-customer1">
</head>
<body class="admin-page">
<main class="admin-app">
  <section class="admin-gate-panel" data-admin-gate>
    <div class="admin-gate-copy">
      <p class="eyebrow">Admin Access</p>
      <h1>고객·문의 관리자</h1>
      <p>관리자 계정으로 고객 현황과 웹 문의를 확인합니다.</p>
    </div>
    <form class="admin-gate-form" data-admin-login-form aria-label="관리자 로그인">
      <label>이메일<input type="email" name="email" autocomplete="email" required></label>
      <label>비밀번호<input type="password" name="password" autocomplete="current-password" required></label>
      <button class="button primary" type="submit">관리자 로그인</button>
      <p class="form-message" data-admin-auth-status role="status" aria-live="polite"></p>
    </form>
  </section>

  <section class="admin-dashboard" data-admin-panel hidden>
    <header class="admin-topbar">
      <a class="admin-brand" href="index.html"><img src="assets/logo-sam.png" alt="" width="38" height="38"><span><strong>기도의샘물</strong><small>고객·문의 관리자</small></span></a>
      <div class="admin-topbar-actions"><a class="button secondary" href="admin-faith-resources.html">자료 관리</a><a class="button secondary" href="admin-faith-orders.html">주문·환불</a><a class="button secondary" href="contact.html" target="_blank" rel="noopener">문의 페이지</a><button class="text-button" type="button" data-admin-logout>로그아웃</button></div>
    </header>

    <div class="admin-console">
      <aside class="admin-sidebar" aria-label="고객 운영">
        <strong>고객 운영</strong>
        <button class="is-active" type="button" data-customer-tab="customers">고객 현황</button>
        <button type="button" data-customer-tab="inquiries">문의 접수</button>
        <div class="admin-sidebar-links"><strong>운영 바로가기</strong><a href="admin-faith-resources.html">신앙자료 관리</a><a href="admin-faith-orders.html">주문·환불 관리</a></div>
      </aside>

      <div class="admin-workspace">
        <div class="admin-workspace-head">
          <div><p class="eyebrow">Customer Operations</p><h2>고객·문의 관리</h2><p>회원, 구매자, 문의 이력과 처리 상태를 한곳에서 확인합니다.</p></div>
          <button class="button secondary" type="button" data-customer-refresh>새로고침</button>
        </div>

        <div class="admin-stat-grid" aria-label="고객 현황">
          <article><span>전체 고객</span><strong data-customer-stat="total">0</strong></article>
          <article><span>회원</span><strong data-customer-stat="members">0</strong></article>
          <article><span>구매 고객</span><strong data-customer-stat="customers">0</strong></article>
          <article><span>미처리 문의</span><strong data-customer-stat="openInquiries">0</strong></article>
        </div>

        <div class="admin-list-toolbar">
          <label class="admin-search"><span>고객 검색</span><input type="search" data-customer-search placeholder="이름, 이메일, 회원 ID"></label>
          <label><span>고객 단계</span><select data-customer-stage><option value="all">전체 단계</option><option value="lead">문의 고객</option><option value="member">회원</option><option value="customer">구매 고객</option><option value="inactive">비활성</option></select></label>
        </div>
        <p class="form-message admin-global-status" data-customer-status role="status" aria-live="polite"></p>

        <section data-customer-panel="customers">
          <div class="admin-resource-list" data-customer-list aria-live="polite"></div>
        </section>
        <section data-customer-panel="inquiries" hidden>
          <div class="admin-resource-list" data-inquiry-list aria-live="polite"></div>
        </section>
      </div>
    </div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-config.js?v=20260715-worker1"></script>
<script src="assets/js/admin-customers.js?v=20260721-customer1"></script>
</body>
</html>
